version: '3.8'

services:
  # BFF (Backend for Frontend) - Entry point for frontend
  bff:
    build:
      context: .
      dockerfile: services/bff/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - FRONTEND_URL=http://localhost:5173
      - MARKET_DATA_SERVICE_URL=http://market-data-service:3001
      - REALTIME_SERVICE_URL=http://realtime-service:3002
    depends_on:
      - market-data-service
      - realtime-service
    networks:
      - tradeapp-network

  # Market Data Service - HTTP REST API
  market-data-service:
    build:
      context: .
      dockerfile: services/market-data-service/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
    networks:
      - tradeapp-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Realtime Service - WebSocket
  realtime-service:
    build:
      context: .
      dockerfile: services/realtime-service/Dockerfile
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - MARKET_DATA_SERVICE_URL=http://market-data-service:3001
      - PRICE_UPDATE_INTERVAL=2000
    depends_on:
      - market-data-service
    networks:
      - tradeapp-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  tradeapp-network:
    driver: bridge
